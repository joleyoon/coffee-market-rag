name: CI

on:
  push:
  pull_request:
    branches: ["main"]

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

      - name: Rebuild retrieval index
        run: python scripts/build_vector_index.py --input-path data/processed/ico/chunks/chunks.jsonl --output-path /tmp/tfidf_index.pkl

      - name: Smoke test application
        run: python app/app.py --index-path /tmp/tfidf_index.pkl "What factors pushed coffee prices down in early 2026?"
