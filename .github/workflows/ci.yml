name: CI

on:
  push:
  pull_request:
    branches: ["main"]

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

      - name: Smoke test versioned data pipeline
        run: |
          python scripts/run_data_pipeline.py \
            --skip-ingest \
            --skip-static-export \
            --manifest-path data/raw/ico/specialized-reports/reports.json \
            --processed-root /tmp/processed-ico \
            --versions-root /tmp/processed-ico/versions \
            --latest-manifest-path /tmp/processed-ico/pipeline_manifest.json

      - name: Smoke test application
        run: python app/app.py --index-path /tmp/processed-ico/index/tfidf_index.pkl "What factors pushed coffee prices down in early 2026?"
