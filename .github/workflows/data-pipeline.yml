name: Data Pipeline

on:
  workflow_dispatch:
  schedule:
    - cron: "17 6 * * *"

jobs:
  ingest-and-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Refresh versioned dataset snapshot
        run: python scripts/run_data_pipeline.py --skip-static-export

      - name: Upload pipeline artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coffee-data-pipeline-${{ github.run_id }}
          path: |
            data/raw/ico/specialized-reports/reports.json
            data/processed/ico
